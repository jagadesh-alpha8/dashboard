<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff6b9d;
      --rose: #e91e63;
      --lavender: #c77dff;
      --deep: #10021a;
      --cream: #fff0f6;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep);
      font-family: 'Playfair Display', serif;
      cursor: none;
    }

    /* CUSTOM CURSOR */
    #cursor {
      position: fixed;
      width: 20px; height: 20px;
      background: var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      transition: transform 0.1s;
      filter: blur(1px);
    }
    #cursor.big { transform: translate(-50%,-50%) scale(3); }

    /* STARFIELD */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.1; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.6); }
    }

    /* AURORA BG */
    .aurora {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .aurora::before {
      content:'';
      position: absolute;
      width: 140%; height: 140%;
      top: -20%; left: -20%;
      background: radial-gradient(ellipse at 30% 40%, #ff6b9d33 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 20%, #c77dff22 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, #e91e6322 0%, transparent 50%);
      animation: auroraMove 8s ease-in-out infinite alternate;
    }
    @keyframes auroraMove {
      0%   { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(3%,4%) rotate(3deg); }
    }

    /* HEARTS RAIN */
    #heartsCanvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* SCENE */
    #scene {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    /* COUPLE SVG */
    #couple-wrap {
      position: relative;
      width: min(500px, 90vw);
      animation: float 4s ease-in-out infinite alternate;
    }
    @keyframes float {
      from { transform: translateY(0px); }
      to   { transform: translateY(-18px); }
    }

    #couple-wrap svg { width: 100%; height: auto; }

    /* HEART BEAT around couple */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--pink);
      opacity: 0;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: pulse-ring 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    @keyframes pulse-ring {
      0%   { width: 60px; height: 60px; opacity: 0.8; }
      100% { width: 300px; height: 300px; opacity: 0; }
    }

    /* TEXT */
    #text-block {
      text-align: center;
      margin-top: 30px;
      animation: fadeUp 1.5s ease both;
      animation-delay: 0.5s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .script-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--pink);
      text-shadow: 0 0 30px #ff6b9d88, 0 0 60px #ff6b9d44;
      letter-spacing: 2px;
      animation: glow 2.5s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #ff6b9d88, 0 0 40px #ff6b9d44; }
      to   { text-shadow: 0 0 40px #ff6b9dcc, 0 0 80px #ff6b9d66, 0 0 120px #ff6b9d33; }
    }

    .subtitle {
      font-style: italic;
      color: #ffb3d1;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      margin-top: 10px;
      opacity: 0.85;
      letter-spacing: 3px;
    }

    /* LOVE COUNTER */
    #counter {
      margin-top: 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .heart-icon {
      font-size: 1.8rem;
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.3); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      70%      { transform: scale(1); }
    }
    .counter-num {
      font-family: 'Dancing Script', cursive;
      color: var(--cream);
      font-size: clamp(1rem, 3vw, 1.5rem);
      letter-spacing: 2px;
    }

    /* MESSAGE BOX */
    #message-box {
      margin-top: 28px;
      max-width: min(480px, 88vw);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,107,157,0.3);
      border-radius: 20px;
      padding: 20px 28px;
      backdrop-filter: blur(8px);
      animation: fadeUp 1.5s ease both;
      animation-delay: 1s;
    }
    #message-box p {
      color: #ffd6e8;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      line-height: 1.85;
      text-align: center;
      font-style: italic;
    }

    /* CLICK HEARTS */
    .click-heart {
      position: fixed;
      pointer-events: none;
      font-size: 1.5rem;
      z-index: 100;
      animation: flyUp 1s ease-out forwards;
    }
    @keyframes flyUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* FIREFLIES */
    .firefly {
      position: fixed;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ffd6e8;
      pointer-events: none;
      z-index: 1;
      animation: fireflyMove var(--dur) ease-in-out infinite alternate, fireflyFade var(--dur) ease-in-out infinite alternate;
      filter: blur(1px);
      box-shadow: 0 0 6px 2px #ff6b9d;
    }
    @keyframes fireflyMove {
      0%   { transform: translate(0,0); }
      100% { transform: translate(var(--tx), var(--ty)); }
    }
    @keyframes fireflyFade {
      0%,100% { opacity: 0.1; }
      50%      { opacity: 0.9; }
    }

    /* BOTTOM LANDSCAPE */
    #landscape {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- HEART RAIN CANVAS -->
<script>
  const canvas = document.getElementById('heartsCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  function drawHeart(ctx, x, y, size, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.translate(x, y);
    ctx.moveTo(0, -size * 0.3);
    ctx.bezierCurveTo(size * 0.5, -size * 1, size * 1.2, size * 0.2, 0, size * 1);
    ctx.bezierCurveTo(-size * 1.2, size * 0.2, -size * 0.5, -size * 1, 0, -size * 0.3);
    ctx.fill();
    ctx.restore();
  }

  const hearts = [];
  const colors = ['#ff6b9d','#c77dff','#ff8fab','#ffd6e8','#e91e63'];
  for (let i = 0; i < 15; i++) {
    hearts.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height + canvas.height,
      size: Math.random() * 10 + 5,
      speed: Math.random() * 0.8 + 0.3,
      drift: (Math.random() - 0.5) * 0.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.4 + 0.2,
      angle: 0,
      angleSpeed: (Math.random() - 0.5) * 0.02
    });
  }

  function animHearts() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hearts.forEach(h => {
      h.y -= h.speed;
      h.x += h.drift;
      h.angle += h.angleSpeed;
      if (h.y < -30) {
        h.y = canvas.height + 30;
        h.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(h.x, h.y);
      ctx.rotate(h.angle);
      drawHeart(ctx, 0, 0, h.size, h.color, h.alpha);
      ctx.restore();
    });
    requestAnimationFrame(animHearts);
  }
  animHearts();
</script>

<!-- CURSOR -->
<script>
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('big'));
  document.addEventListener('mouseup', () => cursor.classList.remove('big'));
</script>

<!-- CLICK HEARTS -->
<script>
  const clickEmojis = ['💕','💖','💗','💝','✨','🌸','💫'];
  document.addEventListener('click', e => {
    const h = document.createElement('div');
    h.className = 'click-heart';
    h.textContent = clickEmojis[Math.floor(Math.random()*clickEmojis.length)];
    h.style.left = e.clientX + 'px';
    h.style.top = e.clientY + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1000);
  });
</script>

<!-- HEART COUNTER + ROTATING MESSAGES -->
<script>
  let count = 0;
  const messages = [
    '"In a sky full of stars, I chose you — and I\'d choose you in a thousand lifetimes."',
    '"Every love song makes sense now, because of you."',
    '"You make ordinary moments feel like poetry."',
    '"My heart found its home the day it found you."',
    '"With you, even silence feels warm."',
    '"You are the dream I never want to wake up from."'
  ];
  let msgIdx = 0;
  const msgEl = document.getElementById('messageText');
  const countEl = document.getElementById('heartCount');

  setInterval(() => {
    count++;
    countEl.textContent = `${count} hearts sent to you 💖`;
  }, 1200);

  setInterval(() => {
    msgIdx = (msgIdx + 1) % messages.length;
    msgEl.style.opacity = '0';
    msgEl.style.transition = 'opacity 0.6s';
    setTimeout(() => {
      msgEl.textContent = messages[msgIdx];
      msgEl.style.opacity = '1';
    }, 600);
  }, 5000);
</script>
